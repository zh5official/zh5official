<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140" fill="none">
  <defs>
    <linearGradient id="pixelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00"/>
      <stop offset="50%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="140" fill="#0B1220" rx="8"/>
  
  <!-- Pixel Grid Pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="20" height="20" fill="#0B1220"/>
    <rect width="1" height="1" fill="#1a2332"/>
  </pattern>
  <rect width="600" height="140" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Z -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="30" y="30" width="60" height="10"/>
    <rect x="80" y="40" width="10" height="10"/>
    <rect x="70" y="50" width="10" height="10"/>
    <rect x="60" y="60" width="10" height="10"/>
    <rect x="50" y="70" width="10" height="10"/>
    <rect x="40" y="80" width="10" height="10"/>
    <rect x="30" y="90" width="60" height="10"/>
  </g>
  
  <!-- H -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="110" y="30" width="10" height="70"/>
    <rect x="120" y="60" width="40" height="10"/>
    <rect x="160" y="30" width="10" height="70"/>
  </g>
  
  <!-- 5 -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="190" y="30" width="50" height="10"/>
    <rect x="190" y="40" width="10" height="20"/>
    <rect x="200" y="60" width="30" height="10"/>
    <rect x="230" y="70" width="10" height="20"/>
    <rect x="190" y="90" width="40" height="10"/>
    <rect x="220" y="80" width="10" height="10"/>
  </g>
  
  <!-- O -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="260" y="40" width="10" height="50"/>
    <rect x="270" y="30" width="30" height="10"/>
    <rect x="270" y="90" width="30" height="10"/>
    <rect x="300" y="40" width="10" height="50"/>
  </g>
  
  <!-- F -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="330" y="30" width="10" height="70"/>
    <rect x="340" y="30" width="40" height="10"/>
    <rect x="340" y="60" width="30" height="10"/>
  </g>
  
  <!-- F -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="400" y="30" width="10" height="70"/>
    <rect x="410" y="30" width="40" height="10"/>
    <rect x="410" y="60" width="30" height="10"/>
  </g>
  
  <!-- I -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="470" y="30" width="10" height="70"/>
    <rect x="460" y="30" width="30" height="10"/>
    <rect x="460" y="90" width="30" height="10"/>
  </g>
  
  <!-- C -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="510" y="40" width="10" height="50"/>
    <rect x="520" y="30" width="30" height="10"/>
    <rect x="520" y="90" width="30" height="10"/>
    <rect x="550" y="40" width="10" height="10"/>
    <rect x="550" y="80" width="10" height="10"/>
  </g>
  
  <!-- I -->
  <g fill="url(#pixelGrad)" filter="url(#glow)">
    <rect x="570" y="30" width="10" height="70"/>
    <rect x="560" y="30" width="30" height="10"/>
    <rect x="560" y="90" width="30" height="10"/>
  </g>
  
  <!-- Subtitle pixel dots -->
  <g fill="#FFFFFF" opacity="0.8">
    <rect x="250" y="120" width="6" height="6"/>
    <rect x="262" y="120" width="6" height="6"/>
    <rect x="274" y="120" width="6" height="6"/>
    <rect x="286" y="120" width="6" height="6"/>
    <rect x="298" y="120" width="6" height="6"/>
    <rect x="310" y="120" width="6" height="6"/>
    <rect x="322" y="120" width="6" height="6"/>
    <rect x="334" y="120" width="6" height="6"/>
  </g>
</svg>
